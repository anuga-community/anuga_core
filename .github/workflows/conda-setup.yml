name: Conda Forge CI

on:

  pull_request:
    branches:
      - main
      - develop
      - develop_gpu
      - develop_cupy
      - feat/sc26

  push:
    branches:
      - main
      - develop
      - develop_gpu
      - develop_cupy
      - jorge/unify_again
      - feat/sc26

jobs:
  test_conda:
    name: Example (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]

        # 2026/04/05: dropped 3.8 -- numpy>=2.0.0 (required by anuga) requires Python>=3.9
        # 2026/04/06: dropped 3.9 -- X | Y union type syntax requires Python>=3.10
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # fetch full history so git describe can find tags
      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest      # Installs Miniforge instead of Miniconda
          use-mamba: true                # Recommended for faster installs
          python-version: ${{ matrix.python-version }}
          auto-update-conda: true        # Auto-update conda or mamba
          conda-remove-defaults: true    # Don't add 'defaults' channel (Miniforge uses conda-forge)
          
      - name: Install Our own environment
        shell: bash -el {0}
        run: |
          conda env create --name anuga_env --file environments/environment_${{matrix.python-version}}.yml


      - name: Install gcc compilers on Windows
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: |
           conda install -c conda-forge -n anuga_env libpython gcc_win-64 gxx_win-64
           # impi_rt: Intel MPI runtime for Windows — provides mpi.h under Library/include
           conda install -c conda-forge -n anuga_env impi_rt mpi4py

           # conda install -c conda-forge -n anuga_env compilers
           # The compilers package on windows which uses clang. We run into
           # problems when testing anuga, so we skip it for now.

      - name: Install clang with openmp compiler on macOS
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
           conda install -c conda-forge -n anuga_env compilers
           # openmpi: available on conda-forge for macOS x86_64 and arm64
           conda install -c conda-forge -n anuga_env openmpi mpi4py

      - name: Set macOS library path for MPI
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          echo "DYLD_LIBRARY_PATH=$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install gxx with openmp compiler on Linux
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: |
           conda install -c conda-forge -n anuga_env compilers libgomp
           # openmpi: available on conda-forge for Linux x86_64 and aarch64
           conda install -c conda-forge -n anuga_env openmpi mpi4py

      - name: Debug MPI environment
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          echo "=== Python prefix ==="
          python -c "import sys; print(sys.prefix)"
          echo "=== mpicc location ==="
          which mpicc 2>/dev/null && mpicc --version 2>&1 | head -2 || echo "mpicc not in PATH"
          echo "=== mpicc -show ==="
          mpicc -show 2>&1 || echo "mpicc -show failed"
          echo "=== mpi.h search under CONDA_PREFIX ==="
          find "$CONDA_PREFIX/include" -name "mpi.h" 2>/dev/null || echo "mpi.h not found under $CONDA_PREFIX/include"
          echo "=== mpi4py config ==="
          python -c "import mpi4py; print('get_include:', mpi4py.get_include()); import json; print('get_config:', mpi4py.get_config())"
          echo "=== mpi4py location ==="
          python -c "import mpi4py, os; print(os.path.dirname(mpi4py.__file__))"

      - name: Install anuga package
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          pip install --no-build-isolation -v .

      - name: Test package (fast — PR feedback)
        if: github.event_name == 'pull_request'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          cd sandpit
          export OMP_NUM_THREADS=1
          pytest -rs --pyargs anuga --run-fast

      - name: Test package (full suite — push to main/develop)
        if: github.event_name == 'push'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          cd sandpit
          export OMP_NUM_THREADS=1
          pytest -rs --pyargs anuga

      - name: Coverage report (Linux / Python 3.12 only)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          pip install pytest-cov
          cd sandpit
          export OMP_NUM_THREADS=1
          pytest --pyargs anuga --cov=anuga --cov-report=xml --cov-report=term-missing --cov-config=../.coveragerc

