name: github CI

on:

  pull_request:
    branches:
      - main
      - develop
      - develop_gpu
      - develop_cupy

  push:
    branches:
      - main
      - develop
      - develop_gpu
      - develop_cupy
      - jorge/unify_again

jobs:
  test_conda:
    name: Example (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]

        # 2025/09/18: 3.8 macos and windows has problems with the new compilers.
        # 2026/01/07: 3.9 problems with argument typing 
        # 2026/04/05: try 3.8 and 3.9 again
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # fetch full history so git describe can find tags
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest      # Installs Miniforge instead of Miniconda
          use-mamba: true                # Recommended for faster installs
          python-version: ${{ matrix.python-version }}
          auto-update-conda: true        # Auto-update conda or mamba
          
      - name: Install Our own environment
        shell: bash -el {0}
        run: |
          conda env create --name anuga_env --file environments/environment_${{matrix.python-version}}.yml


      - name: Install gcc compilers on Windows
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: |
           conda install -c conda-forge -n anuga_env libpython gcc_win-64 gxx_win-64

           # conda install -c conda-forge -n anuga_env compilers
           # The compilers package on windows which uses clang. We run into
           # problems when testing anuga, so we skip it for now.

      - name: Install clang with openmp compiler on macOS
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
           conda install -c conda-forge -n anuga_env compilers

      - name: Install gxx with openmp compiler on Linux
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: |
           conda install -c conda-forge -n anuga_env compilers libgomp

      - name: Install libxcrypt on Linux for Python 3.8 (crypt.h removed in glibc 2.38+)
        if: runner.os == 'Linux' && matrix.python-version == '3.8'
        shell: bash -el {0}
        run: |
           conda install -c conda-forge -n anuga_env libxcrypt

      - name: Problem on windows and Python 3.9 with mpi4py
        # As of 2025/06/19, strange combination of mpi4py, the new compilers and pytest
        # caused a segmentation fault on Windows.
        # This has been resolved by using mpi4py 4.0.3 with Python 3.9
        if: runner.os == 'Windows' && matrix.python-version == '3.9'
        shell: bash -el {0}
        run: |
          # conda uninstall -n anuga_env mpi4py
          echo "No longer need to uninstall mpi4py with Python 3.9 if we use mpi4py 4.0.3"
           
      - name: Install anuga package
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          pip install --no-build-isolation -v .

      - name: Test package (fast — PR feedback)
        if: github.event_name == 'pull_request'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          cd sandpit
          export OMP_NUM_THREADS=1
          pytest -rs --pyargs anuga --run-fast

      - name: Test package (full suite — push to main/develop)
        if: github.event_name == 'push'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          cd sandpit
          export OMP_NUM_THREADS=1
          pytest -rs --pyargs anuga

      - name: Coverage report (Linux / Python 3.12 only)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          pip install pytest-cov
          cd sandpit
          export OMP_NUM_THREADS=1
          pytest --pyargs anuga --run-fast --cov=anuga --cov-report=xml --cov-report=term-missing
        continue-on-error: true

