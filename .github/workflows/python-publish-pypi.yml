# Build wheels on every push / PR for early feedback.
# On a GitHub Release publish, build wheels then upload to PyPI.

name: Build and Publish to PyPI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build one wheel per (python-version, os) combination.
  # Runs on every push/PR so broken wheels are caught before tagging.
  # ---------------------------------------------------------------------------
  build-wheels:
    name: Build wheel (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # git describe needs full history for version
      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          use-mamba: true
          python-version: ${{ matrix.python-version }}
          auto-update-conda: true
          conda-remove-defaults: true

      - name: Create conda environment with build deps
        shell: bash -el {0}
        run: |
          conda create -n anuga_env -c conda-forge \
            python=${{ matrix.python-version }} pip \
            meson-python meson ninja cython pybind11 numpy pkg-config

      - name: Install compilers (Windows)
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: conda install -c conda-forge -n anuga_env libpython gcc_win-64 gxx_win-64

      - name: Install compilers (macOS)
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: conda install -c conda-forge -n anuga_env compilers

      - name: Install compilers (Linux)
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: conda install -c conda-forge -n anuga_env compilers

      - name: Build wheel
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig:$CONDA_PREFIX/share/pkgconfig"
          pip wheel --no-build-isolation --no-deps -w dist-wheel .

      - name: Repair wheel (Linux — make manylinux-compatible)
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          pip install repairwheel
          repairwheel -o dist dist-wheel/*.whl

      - name: Stage wheel (non-Linux)
        if: runner.os != 'Linux'
        shell: bash -el {0}
        run: |
          mkdir -p dist
          cp dist-wheel/*.whl dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-py${{ matrix.python-version }}-${{ matrix.os }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Build Intel macOS (osx-64) wheels. GitHub's macos-latest is Apple Silicon
  # (arm64), so build-wheels above produces only arm64 mac wheels. Apple Silicon
  # runs x86_64 under Rosetta 2, so we create an osx-64 conda env
  # (CONDA_SUBDIR=osx-64; x86_64 python + compilers) on the same arm64 runner
  # and build a native x86_64 wheel there — no scarce macos-13 Intel runners.
  # Artifacts use the wheel-* name so the publish job picks them up.
  # ---------------------------------------------------------------------------
  build-wheels-osx64:
    name: Build wheel (py${{ matrix.python-version }}, macos osx-64)
    runs-on: macos-latest   # Apple Silicon (arm64)
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # git describe needs full history for version

      - name: Ensure Rosetta 2 (to run x86_64 binaries on arm64)
        run: sudo softwareupdate --install-rosetta --agree-to-license || true

      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          use-mamba: true
          auto-update-conda: true
          conda-remove-defaults: true

      - name: Create osx-64 conda env (x86_64 packages, run under Rosetta)
        shell: bash -el {0}
        run: |
          CONDA_SUBDIR=osx-64 conda create -n anuga_env -c conda-forge \
            python=${{ matrix.python-version }} pip \
            meson-python meson ninja cython pybind11 numpy pkg-config compilers
          conda activate anuga_env
          conda config --env --set subdir osx-64

      - name: Build wheel
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig:$CONDA_PREFIX/share/pkgconfig"
          pip wheel --no-build-isolation --no-deps -w dist-wheel .

      - name: Repair wheel (delocate, x86_64)
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          pip install repairwheel
          repairwheel -l "$CONDA_PREFIX/lib" -o dist dist-wheel/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-osx64-py${{ matrix.python-version }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Build the source distribution (once, on Linux / Python 3.13).
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          use-mamba: true
          auto-update-conda: true
          conda-remove-defaults: true

      - name: Create conda environment
        shell: bash -el {0}
        run: |
          conda create -n anuga_env -c conda-forge python=3.13 pip \
            meson-python meson ninja cython pybind11 numpy pkg-config

      - name: Build sdist
        shell: bash -el {0}
        run: |
          conda activate anuga_env
          # PKG_CONFIG_PATH is inherited by the isolated build venv so meson
          # finds conda's Python headers instead of the broken system ones.
          export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig:$CONDA_PREFIX/share/pkgconfig"
          pip install build
          python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish to PyPI — only runs when a GitHub Release is published.
  # Requires all wheel builds and the sdist to succeed first.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-wheels-osx64, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    environment:
      name: anuga
      url: https://pypi.org/p/anuga

    permissions:
      id-token: write  # required for trusted publishing (OIDC)
      contents: write  # required to upload release assets

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist

      - name: List distributions to upload
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verify-metadata: false
          verbose: true
          packages-dir: dist/

      - name: Upload wheels and sdist as GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} dist/* --clobber --repo ${{ github.repository }}
